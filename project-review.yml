  target_state:
    architectural_principles:
    - principle: One owner per domain state
      reason: Packet routing, audio graph routing, workspace view state, samples, and peer sync need explicit owners.
    - principle: Project files are durable contracts
      reason: Users must trust import/export not to lose graph edges, sample refs, clips, arrangement, mixer, or metadata.
    - principle: Browser behavior needs browser tests
      reason: The key product value is visual/audio/UI interaction, which unit string tests cannot prove.
    - principle: Safe rendering by default
      reason: Imported projects and peer/sample metadata are untrusted inputs in a collaborative browser app.
    - principle: Test-first remediation
      reason: Current failures indicate contract drift; expected behavior must be clarified before code changes.
    desired_module_boundaries:
    - boundary: AppBootstrap/DomBindings
      owns:
      - querying required/optional DOM nodes
      - startup order
      - status/error banner
      must_not_own:
      - project schema
      - route graph logic
      - sample sync protocol
      public_contract: init(rootDocument) returns initialized controllers or structured startup error.
    - boundary: WorkspaceController
      owns:
      - session/chains/clips/arrangement/mixer/module view state and rendering
      must_not_own:
      - WebAudio connection side effects
      - peer transport
      public_contract: render(view, state), select(view), bindWorkspaceEvents(root).
    - boundary: RoutingController
      owns:
      - routing graph callbacks
      - audio graph sync
      - route stats
      must_not_own:
      - project file serialization internals
      public_contract: connectAudioEdge, disconnectAudioEdge, clearRoutes(scope), serializeGraph.
    - boundary: ProjectIo
      owns:
      - schema validation
      - import/export/archive/migrations
      must_not_own:
      - DOM alerts
      - module-specific rendering
      public_contract: parseProjectPayload, createProjectPackage, validateProject, migrateProject.
    - boundary: SampleLibraryService
      owns:
      - library storage
      - missing-slot detection
      - metadata/cues/BPM
      - sync-to-library
      must_not_own:
      - DOM drag/drop rendering
      public_contract: load/save/import/export/add/find/detectUsage.
    quality_gates:
      required_for_merge:
      - pnpm check
      - pnpm test -- --runInBand
      - pnpm build
      required_for_release:
      - pnpm verify:deploy
      - browser smoke with no console/page errors, visible patch nodes, and functional workspace tabs
      - pnpm audit --audit-level moderate or documented approved exception
    test_strategy:
      unit: Keep current core/module tests and add conformance tests for every module factory.
      integration: Exercise App/Routing/SampleLibrary/ProjectIo with fake DOM, fake AudioContext, fake peers, and deterministic
        clocks.
      e2e: Add built-dist browser smoke for app load, default rig, patch node bounding boxes, workspace tabs, and no page
        errors.
      contract: Version tests for project schema, sample sync packet schema, module ABI, route ownership, and app-hub deploy
        asset imports.
      regression: Each discovered failure gets a red test first.
      performance: Add large graph/module rack responsiveness checks before performance refactors.
      security: Add DOM injection, archive path validation, dependency audit, and malformed peer/sample payload tests.
    definition_of_done:
    - item: All configured local and deploy gates pass on a clean working tree.
      verification: git status --short; pnpm check; pnpm test -- --runInBand; pnpm build; pnpm verify:deploy.
    - item: Every behavioral fix starts with a failing regression test.
      verification: Task notes or commit history show RED/GREEN for each fix.
    - item: Project import/export preserves user-visible DAW state.
      verification: Round-trip tests cover modules, routes, graph edges, canvas positions, clips, arrangement, mixer, sample
        refs, and metadata.
    - item: Browser smoke proves visible app contract.
      verification: Automated browser run reports no page errors and verifies patch canvas/workspace/module panels.
    - item: Untrusted strings render safely.
      verification: Injection tests assert markup-like names/filenames/peer names are text, not executable DOM.
